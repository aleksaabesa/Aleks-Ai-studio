<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleks AI Studio v1.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #00ffcc; text-align: center; margin: 0; padding: 20px; }
        .app-container { max-width: 450px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 20px; background: #111; box-shadow: 0 10px 30px rgba(0,255,204,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #00ffcc; background: #1a1a1a; color: white; }
        button { background: #00ffcc; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #00cca3; transform: scale(1.05); }
        .hidden { display: none; }
        #chat-box { height: 300px; overflow-y: auto; background: #050505; border-radius: 10px; padding: 15px; text-align: left; margin-bottom: 10px; border: 1px solid #222; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; letter-spacing: 1px; }
        .admin-btn { background: #ff4444; color: white; margin-top: 15px; width: 100%; }
        .download-info { font-size: 13px; color: #ffcc00; border: 1px dashed #ffcc00; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-page">
        <h1>Aleks AI</h1>
        <p>გაიარეთ ავტორიზაცია</p>
        <input type="email" id="user-email" placeholder="example@gmail.com">
        <button onclick="checkAuth()">შესვლა</button>
    </div>

    <div id="push-page" class="hidden">
        <h2>თითქმის მზად არის!</h2>
        <p>ჩართეთ შეტყობინებები AI-სთან დასაკავშირებლად</p>
        <button style="padding: 30px; font-size: 18px;" onclick="requestPush()">ჩართე Notification</button>
    </div>

    <div id="chat-page" class="hidden">
        <h3>Aleks AI Assistant</h3>
        <div id="chat-box"></div>
        <input type="text" id="user-msg" placeholder="მიწერე AI-ს...">
        <button onclick="sendToAI()">გაგზავნა</button>

        <div id="admin-area" class="hidden">
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <input type="text" id="push-text" placeholder="ტექსტი ყველასთვის...">
            <button class="admin-btn" onclick="sendGlobalPush()">გაგზავნა ყველასთან (Push)</button>
        </div>

        <div class="footer">MAKE BY ALEKS STUDIO</div>
        <button style="background: none; color: #555; text-decoration: underline; font-size: 12px;" onclick="showBeta()">Download App Info</button>
    </div>

    <div id="beta-page" class="hidden">
        <div class="download-info">
            <p><strong>ინსტრუქცია:</strong> გამოიყენეთ "Add to Home Screen"</p>
            <p><strong>გაფრთხილება:</strong> აპლიკაცია beta ვერსია არის v1.0</p>
        </div>
        <button onclick="hideBeta()" style="margin-top: 10px;">უკან</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    // შენი კონფიგურაცია
    const firebaseConfig = {
        apiKey: "AIzaSyDirpsw1uu9_OFrTI-4x7ctqzELPk1H0ng",
        authDomain: "aleks-first-ai.firebaseapp.com",
        projectId: "aleks-first-ai",
        storageBucket: "aleks-first-ai.firebasestorage.app",
        messagingSenderId: "618999263356",
        appId: "1:618999263356:web:d6340bfb767a5b671259f9",
        measurementId: "G-DXF18WD5QR"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // ფუნქციები ხელმისაწვდომი რომ იყოს HTML-ისთვის
    window.checkAuth = () => {
        const email = document.getElementById('user-email').value;
        if(email.includes('@')) {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('push-page').classList.remove('hidden');
        }
    };

    window.requestPush = () => {
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                showChat();
            } else {
                alert("შეტყობინებების გარეშე აპი ვერ იმუშავებს!");
            }
        });
    };

    function showChat() {
        document.getElementById('push-page').classList.add('hidden');
        document.getElementById('chat-page').classList.remove('hidden');
        const email = document.getElementById('user-email').value;
        if(email === "alexandreabesadze172@gmail.com") {
            document.getElementById('admin-area').classList.remove('hidden');
        }
    }

    window.sendToAI = () => {
        const msg = document.getElementById('user-msg').value;
        const box = document.getElementById('chat-box');
        if(!msg) return;
        
        box.innerHTML += `<p style="color:#888;"><b>შენ:</b> ${msg}</p>`;
        // AI პასუხი - ავტომატურად იმავე ენაზე
        setTimeout(() => {
            box.innerHTML += `<p><b>AI:</b> გამარჯობა! მე ვარ Aleks-ის AI. რით შემიძლია დაგეხმარო?</p>`;
            box.scrollTop = box.scrollHeight;
        }, 1000);
        document.getElementById('user-msg').value = "";
    };

    window.sendGlobalPush = () => {
        const text = document.getElementById('push-text').value;
        alert("გაიგზავნა ყველასთან: " + text);
    };

    window.showBeta = () => { document.getElementById('chat-page').classList.add('hidden'); document.getElementById('beta-page').classList.remove('hidden'); };
    window.hideBeta = () => { document.getElementById('beta-page').classList.add('hidden'); document.getElementById('chat-page').classList.remove('hidden'); };

</script>
</body>
</html>
