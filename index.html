<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleks AI Studio</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #00ffcc; text-align: center; margin: 0; padding: 10px; }
        .app-container { max-width: 450px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 25px; background: #111; min-height: 80vh; display: flex; flex-direction: column; }
        #chat-box { flex-grow: 1; height: 350px; overflow-y: auto; background: #050505; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #222; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #00ffcc; color: black; }
        .ai-msg { align-self: flex-start; background: #222; color: #00ffcc; border: 1px solid #333; }
        input { width: 70%; padding: 10px; border-radius: 10px; border: 1px solid #00ffcc; background: #1a1a1a; color: white; }
        button { background: #00ffcc; color: black; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-page">
        <h1>Aleks AI</h1>
        <input type="email" id="user-email" placeholder="Email">
        <button onclick="checkAuth()">შესვლა</button>
    </div>

    <div id="chat-page" class="hidden">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="user-msg" placeholder="მიწერე AI-ს..." onkeypress="if(event.key==='Enter') sendToAI()">
            <button onclick="sendToAI()">➤</button>
        </div>
        <p style="font-size: 10px; color: #444; margin-top: 10px;">MADE BY ALEKS STUDIO</p>
    </div>
</div>

<script type="module">
    // აქ ჩასვი შენი ნამდვილი API Key ბრჭყალებში!
   AIzaSyAm19iY-OplL5c_1WYsM2A-5lg4wZNoL3o "; 

    window.checkAuth = () => {
        if(document.getElementById('user-email').value.includes('@')) {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
        }
    };

    window.sendToAI = async () => {
        const input = document.getElementById('user-msg');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const loading = document.createElement("div");
        loading.className = "msg ai-msg";
        loading.innerHTML = "<i>AI ფიქრობს...</i>";
        box.appendChild(loading);

        // --- მათემატიკის ლოგიკა (რომ 2+2 ყოველთვის იმუშაოს) ---
        try {
            const mathResult = eval(text.replace(/[^-()\d/*+.]/g, ''));
            if (!isNaN(mathResult) && (text.includes('+') || text.includes('-') || text.includes('*') || text.includes('/'))) {
                loading.innerHTML = `<b>AI:</b> პასუხია: ${mathResult}`;
                return;
            }
        } catch(e) {}

        // --- ნამდვილი AI-ს გამოძახება ---
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            if(data.candidates) {
                loading.innerHTML = `<b>AI:</b> ${data.candidates[0].content.parts[0].text}`;
            } else {
                loading.innerHTML = "<b>AI:</b> ვერ გავიგე, სცადე სხვა კითხვა.";
            }
        } catch (e) {
            loading.innerHTML = "<b>AI:</b> კავშირის შეცდომა. შეამოწმე API Key!";
        }
        box.scrollTop = box.scrollHeight;
    };
</script>
</body>
</html>
