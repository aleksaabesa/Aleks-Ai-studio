<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleks AI Studio</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aleks AI">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0b0b; color: #00ffcc; text-align: center; margin: 0; padding: 10px; }
        .app-container { max-width: 450px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 25px; background: #111; min-height: 85vh; display: flex; flex-direction: column; }
        #chat-box { flex-grow: 1; height: 350px; overflow-y: auto; background: #050505; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #222; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; word-wrap: break-word; font-size: 15px; }
        .user-msg { align-self: flex-end; background: #00ffcc; color: black; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #222; color: #00ffcc; border: 1px solid #333; border-bottom-left-radius: 2px; }
        input { width: 80%; padding: 12px; border-radius: 12px; border: 1px solid #00ffcc; background: #1a1a1a; color: white; outline: none; margin: 10px 0; }
        button { background: #00ffcc; color: black; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        #install-guide { background: #1a1a1a; border: 1px dashed #00ffcc; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="install-guide" class="hidden">
        <p id="install-text">გსურთ აპლიკაციის დამატება ეკრანზე?</p>
        <button id="pwa-button">ინსტალაცია</button>
    </div>

    <div id="auth-page">
        <img src="icon-192.png" width="80" style="border-radius: 20px; margin-bottom: 10px; box-shadow: 0 0 15px #00ffcc;">
        <h1>Aleks AI</h1>
        <input type="email" id="user-email" placeholder="example@gmail.com">
        <br>
        <button id="login-btn">შესვლა</button>
    </div>

    <div id="chat-page" class="hidden">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="user-msg" placeholder="ჰკითხე AI-ს...">
            <button id="send-btn">➤</button>
        </div>
        <p style="font-size: 9px; color: #444; margin-top: 10px; letter-spacing: 2px;">ALEKS STUDIO PRESENTS</p>
    </div>
</div>

<script type="module">
    const GEMINI_API_KEY = "AIzaSyAm19iY-OplL5c_1WYsM2A-5lg4wZNoL3o"; 

    let deferredPrompt;
    const installGuide = document.getElementById('install-guide');
    const pwaButton = document.getElementById('pwa-button');

    // Android ინსტალაციის მოსმენა
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installGuide.classList.remove('hidden');
    });

    pwaButton.onclick = () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                installGuide.classList.add('hidden');
                deferredPrompt = null;
            });
        }
    };

    // Login & Notifications
    document.getElementById('login-btn').onclick = () => {
        if (document.getElementById('user-email').value.includes('@')) {
            Notification.requestPermission().then(perm => {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('chat-page').classList.remove('hidden');
                if(perm === 'granted') {
                    new Notification("Aleks AI", { body: "მოგესალმებით აპლიკაციაში!", icon: "icon-192.png" });
                }
            });
        }
    };

    // AI Chat Function
    async function sendMessage() {
        const input = document.getElementById('user-msg');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const loading = document.createElement("div");
        loading.className = "msg ai-msg";
        loading.innerHTML = "<i>AI ფიქრობს...</i>";
        box.appendChild(loading);

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            loading.innerHTML = `<b>AI:</b> ${data.candidates[0].content.parts[0].text}`;
        } catch (e) {
            loading.innerHTML = "<b>AI:</b> კავშირის შეცდომა.";
        }
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('user-msg').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js');
    }
</script>
</body>
</html>
